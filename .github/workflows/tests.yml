name: Tests

on:
  push:
    branches:
      - '**'
    tags-ignore:
      - '**'
    paths:
      - 'src/**'
      - 'tests/**'
      - 'poetry.lock'
      - '.github/workflows/**'
      - 'CHANGELOG.rst'  # To ensure CI runs when merging release branch


jobs:
  tests:
    timeout-minutes: 120  # On 17/04/2025: to avoid tests that take too long
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    if: ${{ !contains(github.event.head_commit.message, '[ci skip]') && !contains(github.event.head_commit.message, '[skip ci]') }}
    strategy:
      matrix:
        python-version: [ "3.10", "3.12", "3.14" ]
        os: [ ubuntu-latest, windows-latest, macos-latest ]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'poetry'

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: 2.1.3
          virtualenvs-create: true
          installer-parallel: true

      - name: Load cached venv # Copied from https://github.com/snok/install-poetry/blob/d526ede1e27960b7b181a5ac53044f552afdaa38/README.md
        # load cached venv if cache exists
        # restore-keys allow fallback cache hits when the exact key is not found.
        # GitHub Actions will try to restore any cache whose key *starts with* the prefixes listed here.
        # This helps reuse older venv caches for the same OS & Python version when poetry.lock changes slightly,
        # instead of reinstalling all dependencies from scratch.
        id: cached-poetry-dependencies
        uses: actions/cache@v4
        with:
          path: .venv
          key: venv-${{ matrix.os }}-${{ matrix.python-version }}-${{ hashFiles('poetry.lock') }}
          restore-keys: |
            venv-${{ matrix.os }}-${{ matrix.python-version }}-

      - name: Install dependencies # Heavy dependencies (cached) - only runs on cache miss
        if: steps.cached-poetry-dependencies.outputs.cache-hit != 'true'
        run: poetry install -E --no-interaction --no-root

      - name: Install library # Light project install (always runs) - runs every time
        run: poetry install -E --no-interaction

      - name: Check with Ruff
        run: |
          poetry run ruff check .           # Check coding rules
          poetry run ruff format --check .  # Check format
        shell: bash

      - name: Unit tests without coverage
        run: poetry run pytest src
        shell: bash

      - name: Unit tests with coverage
        # Only for runner that will send coverage reports (see below)
        if: ${{ (runner.os == 'Linux' ) && matrix.python-version == '3.10' }}
        run: |
          poetry run pytest src --cov
          poetry run coverage xml  # for sending coverage report
        shell: bash

      - name: Run codacy-coverage-reporter
        uses: codacy/codacy-coverage-reporter-action@v1.3.0
        if: ${{ runner.os == 'Linux' && matrix.python-version == '3.10' }} # This step runs only on Linux
        with:
          project-token: ${{ secrets.codacy }}
          coverage-reports: coverage.xml

      - uses: codecov/codecov-action@v4
        if: ${{ runner.os == 'Windows' && matrix.python-version == '3.9' }} # Using Windows for covering XFOIL calls
        with:
          #          flags: unittests  # optional
          name: codecov-FAST-GA  # optional
          fail_ci_if_error: false  # optional (default = false)
